<div class="max-w-3xl mx-auto space-y-8">
    <!-- Page Header -->
    <div>
        <h1 class="text-2xl md:text-3xl font-extrabold tracking-tight text-foreground">My Profile</h1>
        <p class="text-muted-foreground mt-1">Manage your personal and professional information</p>
    </div>

    <!-- Loading state -->
    <div *ngIf="loading" class="flex items-center justify-center py-20">
        <div class="flex flex-col items-center gap-3">
            <div class="w-10 h-10 border-4 border-primary/30 border-t-primary rounded-full animate-spin"></div>
            <p class="text-sm text-muted-foreground">Loading candidate data...</p>
        </div>
    </div>

    <!-- Error state -->
    <div *ngIf="error && !loading"
        class="bg-destructive/10 border border-destructive/30 rounded-2xl p-6 text-center">
        <p class="text-destructive font-semibold">{{ error }}</p>
        <button (click)="loadCandidateData()"
            class="mt-3 px-5 py-2 text-sm font-medium bg-primary text-primary-foreground rounded-xl hover:scale-[1.02] transition-all">
            Retry
        </button>
    </div>

    <!-- Profile Card -->
    <div *ngIf="!loading && !error" class="bg-card border border-border rounded-2xl p-6 md:p-8 shadow-sm">
        <!-- Avatar section -->
        <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-8 pb-6 border-b border-border">
            <div class="flex items-center gap-5">
                <div class="w-20 h-20 rounded-2xl bg-primary/15 flex items-center justify-center text-2xl font-extrabold text-primary">
                    {{ getInitials() }}
                </div>
                <div>
                    <h2 class="text-xl font-bold text-foreground">{{ profile.name }}</h2>
                    <p class="text-sm text-muted-foreground">{{ profile.candidate_id }} · {{ profile.source }}</p>
                </div>
            </div>
            <!-- Edit Button -->
            <button *ngIf="!isEditing" type="button" (click)="toggleEdit()"
                class="px-5 py-2.5 text-sm font-semibold text-primary bg-primary/10 hover:bg-primary/20 rounded-xl transition-all flex items-center justify-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4">
                  <path stroke-linecap="round" stroke-linejoin="round" d="m16.862 4.487 1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L6.832 19.82a4.5 4.5 0 0 1-1.897 1.13l-2.685.8.8-2.685a4.5 4.5 0 0 1 1.13-1.897L16.863 4.487Zm0 0L19.5 7.125" />
                </svg>
                Edit Profile
            </button>
        </div>

        <form (ngSubmit)="onSave()" class="space-y-6">
            <!-- Name & Candidate ID -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-foreground mb-2">Full Name</label>
                    <input type="text" [(ngModel)]="profile.name" name="name" [disabled]="!isEditing"
                        class="w-full px-4 py-3 text-sm bg-background border border-input rounded-xl focus:outline-none focus:ring-2 focus:ring-ring focus:border-transparent transition-all text-foreground disabled:bg-muted disabled:text-muted-foreground disabled:cursor-not-allowed disabled:border-transparent" />
                </div>
                <div>
                    <label class="block text-sm font-medium text-foreground mb-2">Candidate ID</label>
                    <input type="text" [value]="profile.candidate_id" name="candidate_id" disabled
                        class="w-full px-4 py-3 text-sm bg-muted border border-transparent rounded-xl text-muted-foreground cursor-not-allowed" />
                </div>
            </div>

            <!-- Contact row -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-foreground mb-2">Email</label>
                    <input type="email" [(ngModel)]="profile.email" name="email" [disabled]="!isEditing"
                        class="w-full px-4 py-3 text-sm bg-background border border-input rounded-xl focus:outline-none focus:ring-2 focus:ring-ring focus:border-transparent transition-all text-foreground disabled:bg-muted disabled:text-muted-foreground disabled:cursor-not-allowed disabled:border-transparent" />
                </div>
                <div>
                    <label class="block text-sm font-medium text-foreground mb-2">Phone</label>
                    <input type="tel" [(ngModel)]="profile.phone" name="phone" [disabled]="!isEditing"
                        class="w-full px-4 py-3 text-sm bg-background border border-input rounded-xl focus:outline-none focus:ring-2 focus:ring-ring focus:border-transparent transition-all text-foreground disabled:bg-muted disabled:text-muted-foreground disabled:cursor-not-allowed disabled:border-transparent" />
                </div>
            </div>

            <!-- Experience & Education -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-foreground mb-2">Experience (years)</label>
                    <input type="text" [(ngModel)]="profile.experience" name="experience" [disabled]="!isEditing"
                        class="w-full px-4 py-3 text-sm bg-background border border-input rounded-xl focus:outline-none focus:ring-2 focus:ring-ring focus:border-transparent transition-all text-foreground disabled:bg-muted disabled:text-muted-foreground disabled:cursor-not-allowed disabled:border-transparent" />
                </div>
                <div>
                    <label class="block text-sm font-medium text-foreground mb-2">Education</label>
                    <input type="text" [(ngModel)]="profile.education" name="education" [disabled]="!isEditing"
                        class="w-full px-4 py-3 text-sm bg-background border border-input rounded-xl focus:outline-none focus:ring-2 focus:ring-ring focus:border-transparent transition-all text-foreground disabled:bg-muted disabled:text-muted-foreground disabled:cursor-not-allowed disabled:border-transparent" />
                </div>
            </div>

            <!-- Skills -->
            <div>
                <label class="block text-sm font-medium text-foreground mb-2">Skills</label>
                <input type="text" [(ngModel)]="profile.skills" name="skills" [disabled]="!isEditing"
                    placeholder="e.g. Node.js, Express, React"
                    class="w-full px-4 py-3 text-sm bg-background border border-input rounded-xl focus:outline-none focus:ring-2 focus:ring-ring focus:border-transparent transition-all text-foreground placeholder:text-muted-foreground/60 disabled:bg-muted disabled:text-muted-foreground disabled:cursor-not-allowed disabled:border-transparent" />
            </div>

            <!-- Notice Period & Expected Salary -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-foreground mb-2">Notice Period (days)</label>
                    <input type="text" [(ngModel)]="profile.notice_period" name="notice_period" [disabled]="!isEditing"
                        class="w-full px-4 py-3 text-sm bg-background border border-input rounded-xl focus:outline-none focus:ring-2 focus:ring-ring focus:border-transparent transition-all text-foreground disabled:bg-muted disabled:text-muted-foreground disabled:cursor-not-allowed disabled:border-transparent" />
                </div>
                <div>
                    <label class="block text-sm font-medium text-foreground mb-2">Expected Salary (₹)</label>
                    <input type="text" [(ngModel)]="profile.expected_salary" name="expected_salary" [disabled]="!isEditing"
                        class="w-full px-4 py-3 text-sm bg-background border border-input rounded-xl focus:outline-none focus:ring-2 focus:ring-ring focus:border-transparent transition-all text-foreground disabled:bg-muted disabled:text-muted-foreground disabled:cursor-not-allowed disabled:border-transparent" />
                </div>
            </div>

            <!-- Source & Ready to Relocate -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-foreground mb-2">Source</label>
                    <input type="text" [(ngModel)]="profile.source" name="source" [disabled]="!isEditing"
                        class="w-full px-4 py-3 text-sm bg-background border border-input rounded-xl focus:outline-none focus:ring-2 focus:ring-ring focus:border-transparent transition-all text-foreground disabled:bg-muted disabled:text-muted-foreground disabled:cursor-not-allowed disabled:border-transparent" />
                </div>
                <div>
                    <label class="block text-sm font-medium text-foreground mb-2">Ready to Relocate</label>
                    <select [(ngModel)]="profile.ready_to_relocate" name="ready_to_relocate" [disabled]="!isEditing"
                        class="w-full px-4 py-3 text-sm bg-background border border-input rounded-xl focus:outline-none focus:ring-2 focus:ring-ring focus:border-transparent transition-all text-foreground disabled:bg-muted disabled:text-muted-foreground disabled:cursor-not-allowed disabled:border-transparent disabled:appearance-none">
                        <option value="true">Yes</option>
                        <option value="false">No</option>
                    </select>
                </div>
            </div>

            <!-- LinkedIn -->
            <div>
                <label class="block text-sm font-medium text-foreground mb-2">LinkedIn URL</label>
                <input type="url" [(ngModel)]="profile.linkedin_url" name="linkedin_url" [disabled]="!isEditing"
                    class="w-full px-4 py-3 text-sm bg-background border border-input rounded-xl focus:outline-none focus:ring-2 focus:ring-ring focus:border-transparent transition-all text-foreground disabled:bg-muted disabled:text-muted-foreground disabled:cursor-not-allowed disabled:border-transparent" />
            </div>

            <!-- Resume Path -->
            <div>
                <label class="block text-sm font-medium text-foreground mb-2">Resume Path</label>
                <div class="flex items-center gap-3">
                    <input type="text" [(ngModel)]="profile.resume_path" name="resume_path" [disabled]="!isEditing"
                        class="flex-1 px-4 py-3 text-sm bg-background border border-input rounded-xl text-foreground focus:outline-none focus:ring-2 focus:ring-ring focus:border-transparent transition-all disabled:bg-muted disabled:text-muted-foreground disabled:cursor-not-allowed disabled:border-transparent" />
                    <a *ngIf="profile.resume_path && !isEditing" [href]="profile.resume_path" target="_blank"
                        class="px-4 py-3 text-sm font-medium bg-accent text-accent-foreground rounded-xl hover:scale-[1.02] transition-all shrink-0">
                        View
                    </a>
                </div>
            </div>

            <!-- Meta info -->
            <div class="pt-4 border-t border-border">
                <div class="flex flex-wrap gap-4 text-xs text-muted-foreground">
                    <span *ngIf="profile.created_at">Created: {{ profile.created_at | date:'medium' }}</span>
                    <span *ngIf="profile.created_by">By: {{ profile.created_by }}</span>
                </div>
            </div>

            <!-- Submit / Cancel -->
            <div *ngIf="isEditing" class="flex justify-end gap-3 pt-2">
                <button type="button" (click)="toggleEdit()" [disabled]="saving"
                    class="px-6 py-3 text-sm font-semibold text-foreground bg-muted hover:bg-muted/80 rounded-xl transition-all disabled:opacity-60 disabled:cursor-not-allowed">
                    Cancel
                </button>
                <button type="submit" [disabled]="saving"
                    class="flex items-center gap-2 px-8 py-3 text-sm font-semibold text-primary-foreground bg-primary rounded-xl shadow-lg hover:shadow-xl hover:scale-[1.01] active:scale-[0.99] transition-all duration-300 disabled:opacity-60 disabled:cursor-not-allowed disabled:hover:scale-100">
                    <div *ngIf="saving" class="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
                    {{ saving ? 'Saving...' : 'Save Changes' }}
                </button>
            </div>
        </form>
    </div>
</div>
